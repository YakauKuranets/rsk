services:
  neo4j-shadow:
    image: neo4j:5.26
    container_name: neo4j-shadow
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-shadow_dev_password_change_me}
      - NEO4J_dbms_security_auth__minimum__password__length=12
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=512m
      - NEO4J_server_default__listen__address=0.0.0.0
      - NEO4J_server_bolt_advertised__address=localhost:${NEO4J_BOLT_PORT:-7687}
    volumes:
      - neo4j_shadow_data:/data
      - neo4j_shadow_logs:/logs
      - ./schema_v1.cypher:/opt/neo4j/import/schema_v1.cypher:ro

volumes:
  neo4j_shadow_data:
  neo4j_shadow_logs:
